<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arma tu Paquete Turístico | Moderno</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    
    <style>
        /* Estilos generales para el modo claro */
        body {
            background-color: #f8fafc; /* Gris muy claro, casi blanco */
        }
        .container-main {
            background-color: #ffffff; /* Fondo blanco para el contenedor */
            color: #1f2937; /* Texto oscuro */
        }
        .text-gray-800 {
            color: #1f2937; /* Título principal */
        }
        .text-gray-700 {
            color: #374151; /* Subtítulos */
        }
        .bg-gray-50 {
            background-color: #f3f4f6; /* Fondo de las secciones en gris claro */
        }
        .border-gray-200 {
            border-color: #e5e7eb;
        }
        .bg-gray-200 {
            background-color: #e5e7eb;
            color: #374151;
        }
        .bg-gray-200:hover {
            background-color: #d1d5db;
        }

        /* Estilos generales para ocultar el contenido de impresión en pantalla */
        #print-content, #cotizacion-print {
            display: none;
        }

        /* Estilos para los botones de opción */
        .btn-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem; /* Padding ajustado */
            border-radius: 9999px;
            font-size: 0.9rem; /* Tamaño de fuente ajustado */
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            height: auto;
            text-align: left;
        }

        /* Estilos de botones NO seleccionados (modo claro) */
        .btn-option:not(.selected) {
            background-color: #e5e7eb;
            color: #374151;
        }
        .btn-option:not(.selected):hover {
            background-color: #d1d5db;
        }
        
        /* Estilos de botones SELECCIONADOS (modo claro) */
        .btn-option.selected {
            background-color: #34d399; /* Verde brillante */
            color: #ffffff; /* Texto blanco para contraste */
            border-color: #68d391;
        }
        .btn-option.selected:hover {
            background-color: #10b981; /* Verde más oscuro al pasar el cursor */
        }
        .btn-option.selected .price {
                color: #ffffff;
        }

        /* Estilos para bloquear los botones (los que no se pueden seleccionar inicialmente) */
        .btn-option.locked {
            pointer-events: none;
            background-color: #a0aec0; /* Gris más oscuro para que resalte */
            color: #4a5568;
        }
        .btn-option.locked.selected {
            background-color: #34d399; /* Asegurar que los seleccionados bloqueados sigan en verde */
            color: #ffffff;
        }

        .pax-input-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }
        .pax-input {
            width: 150px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 0.5rem;
            border: 2px solid #ccc;
            border-radius: 0.5rem;
            background-color: #fff;
            color: #000;
        }

        /* === Estilos para la impresión (media query) === */
        @media print {
            @page {
                size: letter;
                margin: 20mm;
            }
            body {
                background-color: #fff;
                margin: 0;
            }
            .no-print {
                display: none !important;
            }
            .container-print {
                box-shadow: none;
                border: 1px solid #ccc;
                padding: 20px;
                margin: 0; 
                background-color: #fff;
                color: #000;
                width: 100%; 
                max-width: none;
            }
            h1, h2, h3, p, span {
                color: #000 !important;
            }
            
            .main-ui {
                display: none;
            }

            /* Mostrar solo el contenido de impresión detallada */
            body.print-control #print-content {
                display: block !important;
            }

            /* Lógica para la cotización simple */
            body.print-cotizacion #cotizacion-print {
                display: block !important;
                padding: 20px;
            }
            body.print-cotizacion .main-ui, body.print-cotizacion #print-content, body.print-cotizacion .total-price {
                display: none;
            }

            .print-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 5px 0;
                border-bottom: 1px solid #eee;
            }
            .print-item:last-child {
                border-bottom: none;
            }

            .total-final-print {
                font-size: 1.5rem; 
                font-weight: bold;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="relative bg-white rounded-xl shadow-2xl p-4 md:p-8 w-full max-w-4xl lg:max-w-5xl xl:max-w-6xl space-y-6 container-print container-main">

        <div class="no-print absolute top-4 left-4 flex gap-2">
            <button id="control-btn" class="bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-2 rounded-lg text-sm font-semibold flex items-center shadow-md">
                <i class="fas fa-print mr-2"></i> Control
            </button>
            <button id="quote-btn" class="bg-blue-500 text-white hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-semibold flex items-center shadow-md">
                <i class="fas fa-file-invoice mr-2"></i> Cotización
            </button>
        </div>
        
        <div class="main-ui">
            <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6">
                <i class="fas fa-suitcase-rolling text-purple-600 mr-3"></i> Tour Cultural
            </h1>
            <div class="mb-6 text-center">
                <h3 class="text-xl font-bold text-gray-700 mb-3">Número de Personas</h3>
                <div id="pax-container" class="pax-input-container">
                    <input type="number" id="pax-input" class="pax-input" value="" min="0" placeholder="Ej: 2">
                </div>
            </div>
            
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div id="section-hospedaje" class="section bg-gray-50 p-5 rounded-lg shadow-md transition-shadow duration-300">
                    <h3 class="text-xl font-bold text-gray-700 mb-3 flex items-center">
                        <i class="fas fa-hotel text-blue-500 mr-3"></i> Hospedaje
                    </h3>
                    <button type="button" class="btn-option w-full locked" data-price="175" data-id="hospedaje">
                        <span class="flex-grow text-left">Hospedaje</span>
                        <span class="price">Q175</span>
                    </button>
                </div>

                <div id="section-alimentacion" class="section bg-gray-50 p-5 rounded-lg shadow-md transition-shadow duration-300">
                    <h3 class="text-xl font-bold text-gray-700 mb-3 flex items-center">
                        <i class="fas fa-utensils text-green-500 mr-3"></i> Alimentación
                    </h3>
                    <div class="space-y-3">
                        <button type="button" class="btn-option w-full locked" data-price="45" data-id="cena">
                            <span class="flex-grow text-left">Cena</span>
                            <span class="price">Q45</span>
                        </button>
                        <button type="button" class="btn-option w-full locked" data-price="40" data-id="desayuno">
                            <span class="flex-grow text-left">Desayuno</span>
                            <span class="price">Q40</span>
                        </button>
                        <button type="button" class="btn-option w-full locked" data-price="65" data-id="almuerzo">
                            <span class="flex-grow text-left">Experiencia Gastronomica</span>
                            <span class="price">Q65</span>
                        </button>
                    </div>
                </div>

                <div id="section-atractivos" class="section bg-gray-50 p-5 rounded-lg shadow-md transition-shadow duration-300 col-span-full">
                    <h3 class="text-xl font-bold text-gray-700 mb-3 flex items-center">
                        <i class="fas fa-map-marked-alt text-yellow-500 mr-3"></i> Atractivos
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 items-stretch">
                        <button type="button" class="btn-option locked" data-price="0" data-id="abeja">
                            <span class="flex-grow text-left">Abeja</span>
                            <span class="price">Q0</span>
                        </button>
                        <button type="button" class="btn-option locked" data-price="20" data-id="textil">
                            <span class="flex-grow text-left">Textil</span>
                            <span class="price">Q20</span>
                        </button>
                        <button type="button" class="btn-option locked" data-price="25" data-id="cafe">
                            <span class="flex-grow text-left">Café</span>
                            <span class="price">Q25</span>
                        </button>
                        <button type="button" class="btn-option locked" data-price="20" data-id="plantas">
                            <span class="flex-grow text-left">Plantas Medicinales</span>
                            <span class="price">Q20</span>
                        </button>
                        <button type="button" class="btn-option locked" data-price="0" data-id="pintura">
                            <span class="flex-grow text-left">Pintura</span>
                            <span class="price">Q0</span>
                        </button>
                        <button type="button" class="btn-option locked" data-price="35" data-id="cerveza-artesanal">
                            <span class="flex-grow text-left">Cerveza artesanal</span>
                            <span class="price">Q35</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex justify-end mt-4 no-print">
                <button id="personalize-btn" class="bg-blue-500 text-white hover:bg-blue-600 px-6 py-2 rounded-full font-semibold shadow-lg transition-colors duration-300">
                    <i class="fas fa-cogs mr-2"></i> Personalizar
                </button>
            </div>
        </div>
        
        <div id="print-content">
            <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6">
                <i class="fas fa-suitcase-rolling text-purple-600 mr-3"></i> Tour Cultural
            </h1>
        </div>

        <div id="cotizacion-print">
            <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6">
                <i class="fas fa-suitcase-rolling text-purple-600 mr-3"></i> Tour Cultural
            </h1>
        </div>

        <div class="total-price text-right mt-6 pt-4 border-t-2 border-gray-200">
            <p class="text-2xl font-extrabold text-gray-900 flex items-center justify-end">
                Total: <span id="total-price-span" class="ml-4 text-purple-600 text-3xl">$0</span>
            </p>
        </div>
    </div>

<script>
    const optionButtons = document.querySelectorAll('.btn-option');
    const totalPriceSpan = document.getElementById('total-price-span');
    const printContent = document.getElementById('print-content');
    const cotizacionPrint = document.getElementById('cotizacion-print');
    const cenaButton = document.querySelector('[data-id="cena"]');
    const hospedajeButton = document.querySelector('[data-id="hospedaje"]');
    const paxInput = document.getElementById('pax-input');
    const personalizeBtn = document.getElementById('personalize-btn');
    const quoteBtn = document.getElementById('quote-btn');
    const controlBtn = document.getElementById('control-btn');
    
    const QUETZAL_TO_DOLLAR_RATE = 7.5;
    
    const sectionHeaders = {
        'hospedaje': 'Hospedaje',
        'alimentacion': 'Alimentación',
        'atractivos': 'Atractivos'
    };

    function getSectionId(buttonId) {
        if (buttonId === 'hospedaje') return 'hospedaje';
        if (['cena', 'desayuno', 'almuerzo'].includes(buttonId)) return 'alimentacion';
        return 'atractivos';
    }

    function calculateTotal() {
        let numPeople = parseInt(paxInput.value, 10);
        if (isNaN(numPeople) || numPeople < 1) {
            totalPriceSpan.textContent = '$0.00';
            printContent.innerHTML = '';
            cotizacionPrint.innerHTML = '';
            return {
                totalPerPerson: 0,
                totalFinalQuetzales: 0,
                totalFinalDollars: 0,
                iva: 0,
                selectedOptions: []
            };
        }

        let totalBase = 0;
        const selectedOptions = document.querySelectorAll('.btn-option.selected');
        const groupedOptions = {};

        selectedOptions.forEach(button => {
            const price = parseFloat(button.getAttribute('data-price'));
            const isPerPerson = button.closest('#section-alimentacion') || button.closest('#section-atractivos') || button.getAttribute('data-id') === 'hospedaje';
            
            let totalItemPrice;
            if (isPerPerson) {
                totalItemPrice = price * numPeople;
            } else {
                totalItemPrice = price;
            }
            
            totalBase += totalItemPrice;
            
            const optionName = button.querySelector('span:first-child').textContent;
            const section = getSectionId(button.getAttribute('data-id'));

            if (!groupedOptions[section]) {
                groupedOptions[section] = [];
            }
            groupedOptions[section].push({ name: optionName, price: price, total: totalItemPrice, isPerPerson: isPerPerson });
        });

        // Calcular el precio del guía
        let guiaPrice = 0;
        if (numPeople <= 3) {
            guiaPrice = 300;
        } else {
            guiaPrice = numPeople * 100;
        }
        
        // Calcular los costos fijos según el número de personas
        const fixedCostBase = 6000;
        let fixedCost = 0;
        if (numPeople >= 1 && numPeople <= 5) {
            fixedCost = fixedCostBase * 0.05;
        } else if (numPeople >= 6) {
            fixedCost = fixedCostBase * 0.10;
        }
        
        // Costos de transporte
        let transporteLacustre = 0;
        if (numPeople <= 13) {
            transporteLacustre = 800;
        }
        let transporteTerrestre = numPeople * 20;

        // Costo fijo del almuerzo del guía
        const almuerzoGuia = 65;

        // SUMAR TODOS LOS COMPONENTES ANTES DEL EXCEDENTE
        let subtotalPreExcedente = totalBase + guiaPrice + fixedCost + transporteLacustre + transporteTerrestre + almuerzoGuia;

        // CALCULAR EL EXCEDENTE (15% sobre el subtotalPreExcedente)
        const excedente = subtotalPreExcedente * 0.15;
        
        const subtotalQuetzales = subtotalPreExcedente + excedente;

        const iva = (subtotalQuetzales * 100 / 95) * 0.12;
        const isr = (subtotalQuetzales * 100 / 95) * 0.05;

        const totalFinalQuetzales = subtotalQuetzales + iva + isr;
        const totalFinalDollars = totalFinalQuetzales / QUETZAL_TO_DOLLAR_RATE;
        const totalPerPerson = totalFinalDollars / numPeople;

        totalPriceSpan.textContent = `$${totalFinalDollars.toFixed(2)}`;

        return {
            totalPerPerson,
            totalFinalQuetzales,
            totalFinalDollars,
            iva,
            selectedOptions,
            groupedOptions,
            guiaPrice,
            fixedCost,
            transporteLacustre,
            transporteTerrestre,
            almuerzoGuia,
            excedente,
            subtotalQuetzales,
            isr
        };
    }
    
    function generateControlContent() {
        const { totalPerPerson, totalFinalQuetzales, totalFinalDollars, iva, groupedOptions, guiaPrice, fixedCost, transporteLacustre, transporteTerrestre, almuerzoGuia, excedente, subtotalQuetzales, isr } = calculateTotal();
        const numPeople = parseInt(paxInput.value, 10);
        if (isNaN(numPeople) || numPeople < 1) {
             alert('Por favor, ingresa el número de personas para generar el control.');
             return;
        }
        
        printContent.innerHTML = `
            <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6">
                <i class="fas fa-suitcase-rolling text-purple-600 mr-3"></i> Tour Cultural
            </h1>
            <h3 class="text-2xl font-bold text-gray-700 mb-4 mt-6">Número de personas: ${numPeople}</h3>
            <div class="space-y-2">
                <div class="print-item">
                    <span class="font-medium">Guía Turístico</span>
                    <span class="font-semibold">Q${guiaPrice.toFixed(2)}</span>
                </div>
                <div class="print-item">
                    <span class="font-medium">Costos Fijos</span>
                    <span class="font-semibold">Q${fixedCost.toFixed(2)}</span>
                </div>
                <div class="print-item">
                    <span class="font-medium">Transporte Lacustre</span>
                    <span class="font-semibold">Q${transporteLacustre.toFixed(2)}</span>
                </div>
                <div class="print-item">
                    <span class="font-medium">Transporte Terrestre</span>
                    <span class="font-semibold">Q${transporteTerrestre.toFixed(2)}</span>
                </div>
                <div class="print-item">
                    <span class="font-medium">Almuerzo del Guía</span>
                    <span class="font-semibold">Q${almuerzoGuia.toFixed(2)}</span>
                </div>
            </div>
        `;
        
        for (const section in groupedOptions) {
            printContent.innerHTML += `<h3 class="text-2xl font-bold text-gray-700 mb-4 mt-6">${sectionHeaders[section]}</h3>`;
            groupedOptions[section].forEach(option => {
                const itemTotal = option.isPerPerson ? `${option.price.toFixed(2)} x ${numPeople} = Q${option.total.toFixed(2)}` : `Q${option.total.toFixed(2)}`;
                printContent.innerHTML += `
                    <div class="print-item">
                        <span class="font-medium">${option.name}</span>
                        <span class="font-semibold">${itemTotal}</span>
                    </div>
                `;
            });
        }

        printContent.innerHTML += `
            <div class="print-item mt-4 pt-4 border-t border-gray-200">
                <span class="font-bold">Excedente (15%)</span>
                <span class="font-semibold">Q${excedente.toFixed(2)}</span>
            </div>
            <p class="font-bold mt-4">Subtotal: <span class="float-right">Q${subtotalQuetzales.toFixed(2)}</span></p>
            <p class="font-bold mt-2">IVA (12%): <span class="float-right">Q${iva.toFixed(2)}</span></p>
            <p class="font-bold mt-2">ISR (5%): <span class="float-right">Q${isr.toFixed(2)}</span></p>
            <h3 class="total-final-print font-extrabold text-gray-900 mt-6 pt-4 border-t-2 border-gray-200">Total Final: <span class="float-right">Q${totalFinalQuetzales.toFixed(2)} / $${totalFinalDollars.toFixed(2)}</span></h3>
            <h3 class="text-xl font-bold text-gray-900 mt-2">Costo por Persona: <span class="float-right">$${totalPerPerson.toFixed(2)}</span></h3>
        `;
    }
    
    function generateQuoteContent() {
        const { totalPerPerson, totalFinalDollars, selectedOptions } = calculateTotal();
        const numPeople = parseInt(paxInput.value, 10);

        if (isNaN(numPeople) || numPeople < 1) {
             alert('Por favor, ingresa el número de personas para generar la cotización.');
             return;
        }

        cotizacionPrint.innerHTML = `
            <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-6">
                <i class="fas fa-suitcase-rolling text-purple-600 mr-3"></i> Tour Cultural
            </h1>
        `;
        
        const quoteDetails = document.createElement('div');
        quoteDetails.className = 'space-y-4';
        
        const numPeopleQuote = document.createElement('p');
        numPeopleQuote.className = 'text-lg font-semibold';
        numPeopleQuote.textContent = `Número de personas: ${numPeople}`;
        quoteDetails.appendChild(numPeopleQuote);
        
        const includesTitle = document.createElement('h3');
        includesTitle.className = 'text-xl font-bold mt-6 mb-2';
        includesTitle.textContent = 'El paquete incluye:';
        quoteDetails.appendChild(includesTitle);
        
        const includesList = document.createElement('ul');
        includesList.className = 'list-disc list-inside space-y-1 ml-4';

        const optionDescriptions = {
            'hospedaje': 'Hospedaje (incluye cena)',
            'cena': 'Cena',
            'desayuno': 'Desayuno',
            'almuerzo': 'Experiencia Gastronómica',
            'abeja': 'Visita a granja de abejas',
            'textil': 'Visita a taller textil',
            'cafe': 'Tour de café',
            'plantas': 'Tour de plantas medicinales',
            'pintura': 'Clase de pintura',
            'cerveza-artesanal': 'Tour de cerveza artesanal'
        };

        let itemsIncluded = [];
        if (numPeople > 0) {
            itemsIncluded.push('Guía Turístico');
            itemsIncluded.push('Transporte Lacustre');
            itemsIncluded.push('Transporte Terrestre');
        }

        selectedOptions.forEach(button => {
            const optionId = button.getAttribute('data-id');
            if (optionDescriptions[optionId]) {
                itemsIncluded.push(optionDescriptions[optionId]);
            }
        });

        itemsIncluded.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            includesList.appendChild(li);
        });
        quoteDetails.appendChild(includesList);

        const quoteTotals = document.createElement('div');
        quoteTotals.className = 'mt-8 pt-4 border-t-2 border-gray-200 space-y-2';

        const totalPerPersonQuote = document.createElement('p');
        totalPerPersonQuote.className = 'text-xl font-bold flex justify-between';
        totalPerPersonQuote.innerHTML = `Costo por Persona: <span class="text-purple-600">$${totalPerPerson.toFixed(2)}</span>`;
        quoteTotals.appendChild(totalPerPersonQuote);
        
        const totalQuoteUSD = document.createElement('p');
        totalQuoteUSD.className = 'text-xl font-bold flex justify-between';
        totalQuoteUSD.innerHTML = `Total General (IVA Incluido): <span class="text-purple-600">$${totalFinalDollars.toFixed(2)}</span>`;
        quoteTotals.appendChild(totalQuoteUSD);
        
        quoteDetails.appendChild(quoteTotals);
        cotizacionPrint.appendChild(quoteDetails);
    }
    
    function selectDefaultOptions() {
        const defaultOptions = ['almuerzo', 'textil','pintura','plantas','cerveza-artesanal'];
        optionButtons.forEach(button => {
            const buttonId = button.getAttribute('data-id');
            if (defaultOptions.includes(buttonId)) {
                button.classList.add('selected');
            } else {
                button.classList.remove('selected');
            }
        });
        calculateTotal();
    }

    function enableAllOptions() {
        optionButtons.forEach(button => {
            button.classList.remove('locked');
            button.style.pointerEvents = 'auto'; 
        });
        personalizeBtn.style.display = 'none'; 
    }

    optionButtons.forEach(button => {
        button.addEventListener('click', function() {
            const buttonId = this.getAttribute('data-id');
            if (buttonId === 'hospedaje') {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    cenaButton.classList.remove('selected');
                } else {
                    this.classList.add('selected');
                    cenaButton.classList.add('selected');
                }
            } else if (buttonId === 'cena') {
                if (hospedajeButton.classList.contains('selected')) {
                    return;
                }
                this.classList.toggle('selected');
            } else {
                this.classList.toggle('selected');
            }
            calculateTotal();
        });
    });
    
    quoteBtn.addEventListener('click', () => {
        generateQuoteContent();
        document.body.classList.add('print-cotizacion');
        window.print();
        document.body.classList.remove('print-cotizacion');
    });

    controlBtn.addEventListener('click', () => {
        generateControlContent();
        document.body.classList.add('print-control');
        window.print();
        document.body.classList.remove('print-control');
    });

    paxInput.addEventListener('input', calculateTotal);
    
    personalizeBtn.addEventListener('click', enableAllOptions);

    selectDefaultOptions();
</script>

</body>
</html>
