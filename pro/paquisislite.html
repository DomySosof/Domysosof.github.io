<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Paquisis - 3 Columnas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0F172A; 
            --primary: #10B981; 
            --text-light: #E2E8F0; 
            --card-bg: #1E293B;
            --border: #334155;
            --accent: #F59E0B;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-light);
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            width: 100%;
            gap: 20px;
            padding: 20px;
            align-items: flex-start;
        }

        .config-side {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0;
        }

        .audit-side {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .preview-side {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
        h3 { color: var(--primary); margin-bottom: 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
        
        input, select { 
            width: 100%; padding: 8px; background: #0f172a; border: 1px solid var(--border); 
            color: white; border-radius: 6px; font-size: 13px;
        }

        /* Estilo especial para OTAS */
        .otas-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(245, 158, 11, 0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--accent);
        }

        .audit-panel {
            background: #000;
            padding: 18px;
            border-radius: 12px;
            color: #10B981;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border: 1px solid #10B981;
            line-height: 1.5;
            min-height: 400px;
        }

        .document-preview { 
            width: 8.5in;
            height: 11in;
            background-color: white;
            color: #1e293b;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .background-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('logo.png');
            background-size: 100% 100%;
            z-index: 0;
            opacity: 0.2; 
        }

        .content-area { 
            position: relative; 
            z-index: 1; 
            padding: 5.2cm 2.2cm 7.5cm 2.2cm; 
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        table { width: 100%; border-collapse: collapse; }
        th { color: #059669; border-bottom: 2px solid #059669; padding: 8px; text-align: left; font-size: 12px; }
        td { padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .disabled-row { opacity: 0.15; text-decoration: line-through; }

        @media print {
            @page { size: letter; margin: 0; }
            .config-side, .audit-side, .no-print, .check-col { display: none !important; }
            .price-col { display: none !important; }
            body { background: white; }
            .main-container { padding: 0; display: block; }
            .document-preview { width: 8.5in; height: 11in; background: white !important; box-shadow: none; }
            .background-overlay { display: block !important; opacity: 1 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="config-side no-print">
        <div class="card">
            <h3>👤 Cliente</h3>
            <div class="input-group"><label>Nombre</label><input type="text" id="inClient" oninput="calculate()"></div>
            <div class="input-group"><label>NIT / DPI</label><input type="text" id="inNit" value="CF" oninput="calculate()"></div>
        </div>

        <div class="card">
            <h3>📊 Operación</h3>
            <div class="input-grid">
                <div class="input-group"><label>Pax</label><input type="number" id="inPax" value="1" oninput="updatePax()"></div>
                <div class="input-group"><label>T. Cambio</label><input type="number" id="inTC" value="7.30" oninput="calculate()"></div>
            </div>
            <div class="input-grid">
                <div class="input-group"><label>% Fijo</label><input type="number" id="inPercF" value="2" oninput="calculate()"></div>
                <div class="input-group"><label>% Utilidad</label><input type="number" id="inPercI" value="10" oninput="calculate()"></div>
            </div>
            
            <div class="otas-row">
                <div style="flex-grow:1">
                    <label style="color:var(--accent)">% OTAS (Agencias)</label>
                    <input type="number" id="inOtas" value="45" oninput="calculate()">
                </div>
                <div style="padding-top:15px;">
                    <input type="checkbox" id="checkOtas" onchange="calculate()" style="width:20px; height:20px; cursor:pointer;">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🛶 Extras</h3>
            <div class="input-group"><label>Lancha Privada (Q)</label><input type="number" id="inLancha" value="0" oninput="calculate()"></div>
            <div class="input-group"><label>Guía (Q)</label><input type="number" id="inGuiaManual" value="400" oninput="calculate()"></div>
        </div>

        <div class="card">
            <select id="currencyDisplay" onchange="calculate()">
                <option value="both">Mostrar Q y $</option>
                <option value="gtq">Solo Quetzales</option>
                <option value="usd">Solo Dólares</option>
            </select>
            <button onclick="window.print()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; margin-top:10px; border-radius:8px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR</button>
        </div>
    </div>

    <div class="audit-side no-print">
        <div class="audit-panel">
            <div style="font-weight:bold; color:#FFF; margin-bottom:10px; border-bottom: 1px solid #10B981; padding-bottom: 5px;">📊 AUDITORÍA TÉCNICA</div>
            <div id="debug-log"></div>
        </div>
    </div>

    <div class="preview-side">
        <div class="document-preview">
            <div class="background-overlay"></div>
            <div class="content-area">
                <div style="text-align:center; margin-bottom:25px;">
                    <h1 style="color:#27ae60; font-size:24px;">VOLCÁN PAQUISIS</h1>
                    <p style="font-size:10px; letter-spacing:3px; color:#64748b;">COTIZACIÓN DE SERVICIOS</p>
                </div>

                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:20px;">
                    <div><strong>CLIENTE:</strong> <span id="outName">---</span></div>
                    <div style="text-align:right;">
                        <strong>NIT:</strong> <span id="outNit">CF</span><br>
                        <strong>FECHA:</strong> <span id="outDate">---</span><br>
                        <strong>PERSONAS:</strong> <span id="outPax">1</span> </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th class="check-col no-print"></th>
                            <th style="width:70px;">HORA</th>
                            <th>SERVICIO</th>
                            <th style="text-align:right;" class="price-col">SUBTOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="itinerary-body"></tbody>
                </table>

                <div style="margin-top:auto; text-align:right; border-top:2px solid #27ae60; padding-top:15px;">
                    <div id="resGTQ">
                        <h2 style="font-size:28px;">TOTAL: <span id="v-final-gtq">Q 0</span></h2>
                        <p style="color:#64748b;">Por persona: <b>Q <span id="v-pax-gtq">0</span></b></p>
                    </div>
                    <div id="resUSD" style="margin-top:10px; border-top:1px dashed #ccc; padding-top:10px;">
                        <h3>TOTAL USD: <span id="v-final-usd">$ 0</span></h3>
                        <p style="color:#64748b;">Por persona: <b>$ <span id="v-pax-usd">0</span></b></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let activeItems = [true, true, true, true, true, true, true, true];

    function updatePax() {
        const pax = parseInt(document.getElementById('inPax').value) || 1;
        document.getElementById('inGuiaManual').value = (pax >= 9) ? 1000 : (pax >= 4) ? 600 : 400;
        calculate();
    }

    function toggleItem(index) {
        activeItems[index] = !activeItems[index];
        calculate();
    }

    function calculate() {
        const pax = parseInt(document.getElementById('inPax').value) || 1;
        const tc = parseFloat(document.getElementById('inTC').value) || 7.30;
        const percF = parseFloat(document.getElementById('inPercF').value) / 100;
        const percI = parseFloat(document.getElementById('inPercI').value) / 100;
        const lancha = parseFloat(document.getElementById('inLancha').value) || 0;
        const guia = parseFloat(document.getElementById('inGuiaManual').value) || 0;
        
        // Valores OTAS
        const valOtas = parseFloat(document.getElementById('inOtas').value) / 100;
        const useOtas = document.getElementById('checkOtas').checked;

        document.getElementById('outName').innerText = document.getElementById('inClient').value || "---";
        document.getElementById('outNit').innerText = document.getElementById('inNit').value || "CF";
        document.getElementById('outDate').innerText = new Date().toLocaleDateString();
        document.getElementById('outPax').innerText = pax;

        const items = [
            { h: "04:00", d: "Guía Local Certificado", p: guia, type: 'f' },
            { h: "04:20", d: "Transporte y Entradas", p: 500, type: 'f' },
            { h: "04:30", d: "Ascenso Volcán", p: 0, type: 'f' },
            { h: "06:30", d: "Degustación Café", p: 25, type: 'p' },
            { h: "08:30", d: "Box Lunch Especial", p: 65, type: 'p' },
            { h: "10:30", d: "Descenso Volcán", p: 0, type: 'f' },
            { h: "12:30", d: "Transporte Restaurante", p: 500, type: 'f' },
            { h: "13:30", d: "Degustación Gastronómica", p: 75, type: 'p' }
        ];

        let costoBase = 0;
        const tbody = document.getElementById('itinerary-body');
        tbody.innerHTML = '';
        
        items.forEach((item, index) => {
            const isActive = activeItems[index];
            let rowCost = (item.type === 'p') ? (item.p * pax) : item.p;
            if (isActive) costoBase += rowCost;
            tbody.innerHTML += `
                <tr class="${isActive ? '' : 'disabled-row'}">
                    <td class="check-col no-print"><input type="checkbox" ${isActive?'checked':''} onchange="toggleItem(${index})"></td>
                    <td><b>${item.h}</b></td>
                    <td>${item.d}</td>
                    <td style="text-align:right;" class="price-col">Q ${rowCost.toFixed(2)}</td>
                </tr>`;
        });

        if (lancha > 0) { 
            costoBase += lancha; 
            tbody.innerHTML += `<tr><td class="no-print"></td><td>---</td><td>Lancha Privada</td><td style="text-align:right;" class="price-col">Q ${lancha.toFixed(2)}</td></tr>`; 
        }

        let montoFijo = 12970 * percF;
        let utilidad = (costoBase + montoFijo) * percI;
        let subtotal = costoBase + montoFijo + utilidad + (0.33 * tc);
        
        const com = 0.045, iva = 0.1071, isr = 0.0446;
        
        // Lógica de Factor con OTAS
        let sumatoriaImpuestos = com + iva + isr;
        if (useOtas) {
            sumatoriaImpuestos += valOtas;
        }
        
        let factor = 1 - sumatoriaImpuestos; 
        
        // Evitar división por cero o negativo si el % es muy alto
        if (factor <= 0) factor = 0.01;

        let finalGTQ = subtotal / factor;

        document.getElementById('v-final-gtq').innerText = `Q ${Math.ceil(finalGTQ).toLocaleString()}`;
        document.getElementById('v-pax-gtq').innerText = Math.ceil(finalGTQ / pax).toLocaleString();
        document.getElementById('v-final-usd').innerText = `$ ${Math.ceil(finalGTQ/tc).toLocaleString()}`;
        document.getElementById('v-pax-usd').innerText = Math.ceil((finalGTQ/tc) / pax).toLocaleString();

        const view = document.getElementById('currencyDisplay').value;
        document.getElementById('resGTQ').style.display = (view === 'usd') ? 'none' : 'block';
        document.getElementById('resUSD').style.display = (view === 'gtq') ? 'none' : 'block';

        document.getElementById('debug-log').innerHTML = `
            <b style="color:#FFF">1. COSTOS BASE:</b><br>
            Actividades: Q ${costoBase.toFixed(2)}<br>
            Costo Fijo: Q ${montoFijo.toFixed(2)}<br>
            Utilidad: Q ${utilidad.toFixed(2)}<br>
            <span style="color:white">Subtotal: Q ${subtotal.toFixed(2)}</span><br><br>
            
            <b style="color:#FFF">2. FACTOR MATEMÁTICO:</b><br>
            1 - (POS 4.5% + IVA + ISR ${useOtas ? '+ OTAS ' + (valOtas*100) + '%' : ''})<br>
            1 - ${sumatoriaImpuestos.toFixed(4)} = <span style="color:white">${factor.toFixed(4)}</span><br><br>
            
            <b style="color:#FFF">3. VENTA FINAL:</b><br>
            ${subtotal.toFixed(2)} / ${factor.toFixed(4)}<br>
            <span style="color:#FFF; font-size:16px">Q ${finalGTQ.toFixed(2)}</span><br><br>
            
            <b style="color:#FFF">4. RETENCIONES:</b><br>
            IVA/ISR: Q ${(finalGTQ * (iva+isr)).toFixed(2)}<br>
            Comisión POS: Q ${(finalGTQ * com).toFixed(2)}<br>
            ${useOtas ? '<span style="color:#F59E0B">Comisión OTAS: Q ' + (finalGTQ * valOtas).toFixed(2) + '</span>' : ''}
        `;
    }
    window.onload = calculate;
</script>
</body>
</html>
