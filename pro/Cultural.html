<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador San Juan La Laguna - v4 UI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0F172A; 
            --primary: #10B981; 
            --text-light: #f8fafc; 
            --card-bg: #1E293B;
            --border: #334155;
            --accent: #F59E0B;
            --panel-blue: #1e3a5a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-light);
            height: 100vh;
            overflow: hidden; 
        }

        .main-container {
            display: grid;
            grid-template-columns: 380px 1fr 340px;
            gap: 15px;
            height: 100vh;
            padding: 15px;
        }

        .config-side, .audit-side { 
            background: var(--panel-blue);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .preview-side { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px;
            overflow-y: auto;
        }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
        h3 { color: var(--primary); margin-bottom: 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea { 
            width: 100%; padding: 8px; background: #0f172a; border: 1px solid var(--border); 
            color: white; border-radius: 6px; font-size: 12px; margin-bottom: 5px;
        }

        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }

        .activity-item {
            padding: 10px; margin-bottom: 8px; background: rgba(0,0,0,0.2);
            border-radius: 8px; border: 1px solid var(--border);
        }
        .activity-name { font-size: 11px; display: block; margin-bottom: 8px; color: #e2e8f0; line-height: 1.2; }
        
        .day-selector { display: flex; gap: 4px; }
        .day-btn {
            flex: 1; height: 28px; border-radius: 6px; border: 1px solid #475569;
            background: #0f172a; color: #94a3b8; font-size: 10px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .day-btn.none.active { background: #ef4444; border-color: #ef4444; color: white; }

        .audit-group { margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .audit-group-title { font-size: 10px; color: var(--primary); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .audit-item { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; }
        .audit-label { color: #94a3b8; }
        .audit-val { color: #fff; font-family: monospace; }
        .audit-highlight { color: var(--accent); font-weight: bold; }

        .document-preview, .control-interno-view { 
            position: relative; width: 8.5in; min-height: 11in; 
            background-color: white; color: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            display: none; margin-bottom: 20px; flex-shrink: 0;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        #client-view { display: block; }
        .background-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('logo.png'); background-size: contain; 
            background-repeat: no-repeat; background-position: center; z-index: 0; 
        }
        .content-area { position: relative; z-index: 1; padding: 4.5cm 2.5cm 3cm 2.5cm; font-size: 11px; }
        table { width: 100%; border: 1.5px solid #000; border-collapse: collapse; margin-top: 10px; background-color: rgba(255,255,255,0.7); }
        th, td { border: 1px solid #000; padding: 6px 10px; text-align: left; color: #000; }

        @media print {
            .no-print { display: none !important; }
            body { overflow: visible; background: white !important; }
            .main-container { display: block; padding: 0; }
            .preview-side { overflow: visible; width: 100%; }
            .document-preview, .control-interno-view { box-shadow: none; margin: 0; display: block; }
            body.print-client #control-interno-view { display: none !important; }
            body.print-client #client-view { display: block !important; }
            body.print-control #client-view { display: none !important; }
            body.print-control #control-interno-view { display: block !important; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="config-side no-print">
        <div class="card">
            <h3>👤 Información</h3>
            <label>Nombre del Cliente</label>
            <input type="text" id="inClient" oninput="calculate()">
            <label>NIT</label>
            <input type="text" id="inNit" value="CF" oninput="calculate()">
            <label>Observaciones</label>
            <textarea id="inObs" rows="3" oninput="calculate()"></textarea>
        </div>

        <div class="card">
            <h3>📅 Actividades</h3>
            <div id="selector-container"></div>
        </div>

        <div class="card">
            <h3>📊 Económicos</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Pax</label><input type="number" id="inPax" value="1" oninput="updatePax()"></div>
                <div><label>T. Cambio</label><input type="number" id="inTC" value="7.3" oninput="calculate()"></div>
                <div><label>Costo Fijo %</label><input type="number" id="inPercF" value="2" oninput="calculate()"></div>
                <div><label>Utilidad %</label><input type="number" id="inPercI" value="10" oninput="calculate()"></div>
            </div>
            <div style="background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent); border-radius: 8px; padding: 10px; margin-top: 10px;">
                <label style="color:var(--accent);">Comisión OTAS</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="inOtasVal" value="45" oninput="calculate()" style="margin:0;">
                    <span style="color:white">%</span>
                    <input type="checkbox" id="checkOtas" onchange="calculate()" style="width:25px; height:25px; margin:0; cursor:pointer;">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🛶 Extras (Q)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Lancha</label><input type="number" id="inLancha" value="0" oninput="calculate()"></div>
                <div><label>Guía</label><input type="number" id="inGuiaManual" value="300" oninput="calculate()"></div>
            </div>
            <label>Mirador</label><input type="number" id="inMirador" value="25" oninput="calculate()">
        </div>
    </div>

    <div class="preview-side">
        <div class="no-print" style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="imprimirDocumento('client')" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🖨️ ITINERARIO</button>
            <button onclick="imprimirDocumento('control')" style="padding:10px 20px; background:#6366f1; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">📑 CONTROL</button>
            <select id="currencyDisplay" onchange="calculate()" style="width: auto;">
                <option value="both">Q y $</option>
                <option value="gtq">Solo Q</option>
                <option value="usd">Solo $</option>
            </select>
        </div>

        <div class="document-preview" id="client-view">
            <div class="background-overlay"></div>
            <div class="content-area">
                <div style="text-align:center; color:#27ae60;">
                    <h1 style="font-size: 22px;">SAN JUAN LA LAGUNA</h1>
                    <p style="letter-spacing:4px; font-size: 10px;">ITINERARIO PERSONALIZADO</p>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:20px; border-bottom: 2px solid #27ae60; padding-bottom:10px;">
                    <div><strong>CLIENTE:</strong> <span id="outName">---</span><br><strong>NIT:</strong> <span id="outNit">CF</span></div>
                    <div style="text-align:right;"><strong>FECHA:</strong> <span id="outDate">---</span><br><strong>PERSONAS:</strong> <span id="outPax">1</span></div>
                </div>
                <table>
                    <thead><tr style="background:#f1f5f9;"><th style="width:80px;">DÍA</th><th>ACTIVIDADES</th></tr></thead>
                    <tbody id="itinerary-preview-body"></tbody>
                </table>
                <div id="outObs" style="margin-top:15px; font-style:italic; border: 1px dashed #ccc; padding: 10px; font-size: 10px; display:none; background: rgba(0,0,0,0.02);"></div>
                
                <div style="margin-top:auto; text-align:right; border-top:2.5 solid #27ae60; padding-top:12px;">
                    <div id="resGTQ">
                        <h2 style="font-size: 24px;">TOTAL: Q <span id="v-final-gtq">0</span></h2>
                        <p>Por persona: Q <span id="v-pax-gtq">0</span></p>
                    </div>
                    <div id="resUSD" style="margin-top:8px; border-top:1px dashed #ccc; padding-top:8px;">
                        <h3 style="color:#555;">TOTAL USD: $ <span id="v-final-usd">0</span></h3>
                        <p>Por persona: $ <span id="v-pax-usd">0</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-interno-view" id="control-interno-view" style="padding: 40px; background:white; color:black;">
            <h2 style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 10px;">CONTROL INTERNO DE COSTOS</h2>
            <p style="margin:10px 0;"><strong>Cliente:</strong> <span id="ctrl-name-out"></span> | <strong>Pax:</strong> <span id="ctrl-pax-out"></span></p>
            <div id="control-table-container"></div>
        </div>
    </div>

    <div class="audit-side no-print">
        <div class="card">
            <h3 style="color:var(--accent)">📊 Auditoría Maestra</h3>
            <div id="debug-log"></div>
        </div>
    </div>
</div>

<script>
    let currentGlobalTotal = 0;

    let activities = [
        { d: "Transporte Lacustre Privado (Panajachel - San Juan)", p: 50, day: 0 },
        { d: "Cena Familiar", p: 75, day: 0 },
        { d: "Guía Local (Día 1)", p: 0, day: 0 },
        { d: "Guías Locales (Amanecer y tour del día)", p: 50, day: 0 },
        { d: "Amanecer Mirador (Transporte e ingreso)", p: 30, day: 0 },
        { d: "Desayuno Familiar", p: 65, day: 0 },
        { d: "Recorrido calles pintorescas", p: 0, day: 0 },
        { d: "Entradas a los lugares para los tours", p: 25, day: 0 },
        { d: "Tour de abejas sin aguijón", p: 0, day: 0 },
        { d: "Tour de Cerveza artesanal", p: 0, day: 0 },
        { d: "Demostración de tintes y textiles", p: 0, day: 0 },
        { d: "Almuerzo Típico Gastronómico", p: 75, day: 0 },
        { d: "Visita galería de arte local", p: 0, day: 0 },
        { d: "Tour de Cacao", p: 0, day: 0 },
        { d: "Degustación de café", p: 25, day: 0 },
        { d: "Mirador y sesión de fotos (Guía)", p: 25, day: 0 },
        { d: "Temazcal", p: 175, day: 0 },
        { d: "Guías Locales (Día 3)", p: 50, day: 0 },
        { d: "Desayuno Familiar (Día 3)", p: 65, day: 0 },
        { d: "Mirador San Antonio Palopó", p: 0, day: 0 },
        { d: "Tour Santiago Atitlán", p: 25, day: 0 },
        { d: "Almuerzo (Día 3)", p: 75, day: 0 },
        { d: "Canopy San Pedro La Laguna", p: 150, day: 0 },
        { d: "Tour San Pedro (Iglesia)", p: 25, day: 0 },
        { d: "Transporte Terrestre Privado (Inter-pueblos)", p: 25, day: 0 },
        { d: "Transporte Lacustre Privado (Día 3)", p: 50, day: 0 },
        { d: "Transporte Lacustre privado (Retorno)", p: 50, day: 0 },
        { d: "Guía por una hora (Día 4)", p: 20 , day: 0 }
    ];

    function initSelector() {
        const container = document.getElementById('selector-container');
        container.innerHTML = '';
        activities.forEach((act, idx) => {
            const item = document.createElement('div');
            item.className = 'activity-item';
            const getActive = (d) => act.day === d ? 'active' : '';
            item.innerHTML = `<span class="activity-name">${act.d}</span><div class="day-selector">
                <button class="day-btn none ${getActive(0)}" onclick="setDay(${idx},0)">✕</button>
                ${[1,2,3,4].map(d => `<button class="day-btn ${getActive(d)}" onclick="setDay(${idx},${d})">${d}</button>`).join('')}
            </div>`;
            container.appendChild(item);
        });
    }

    function setDay(idx, day) { activities[idx].day = day; initSelector(); calculate(); }
    
    function updatePax() {
        const pax = parseInt(document.getElementById('inPax').value) || 1;
        document.getElementById('inGuiaManual').value = (pax >= 9) ? 1000 : (pax >= 4) ? 600 : 300;
        calculate();
    }

    function calculate() {
        const pax = parseInt(document.getElementById('inPax').value) || 1;
        const tc = parseFloat(document.getElementById('inTC').value) || 7.3;
        const pFijoP = parseFloat(document.getElementById('inPercF').value) || 0;
        const pUtilP = parseFloat(document.getElementById('inPercI').value) || 0;
        const useOtas = document.getElementById('checkOtas').checked;
        const otaPerc = useOtas ? (parseFloat(document.getElementById('inOtasVal').value) || 0) : 0;
        
        const miradorVal = parseFloat(document.getElementById('inMirador').value) || 0;
        const guiaExtra = parseFloat(document.getElementById('inGuiaManual').value) || 0;
        const lanchaExtra = parseFloat(document.getElementById('inLancha').value) || 0;

        document.getElementById('outName').innerText = document.getElementById('inClient').value || "---";
        document.getElementById('ctrl-name-out').innerText = document.getElementById('inClient').value || "---";
        document.getElementById('outNit').innerText = document.getElementById('inNit').value.trim().toUpperCase() || "---";
        document.getElementById('outPax').innerText = pax;
        document.getElementById('ctrl-pax-out').innerText = pax;
        document.getElementById('outDate').innerText = new Date().toLocaleDateString('es-GT');

        const obs = document.getElementById('inObs').value;
        const outObs = document.getElementById('outObs');
        if (obs) { outObs.style.display = 'block'; outObs.innerHTML = "<b>NOTAS:</b> " + obs; } 
        else { outObs.style.display = 'none'; }

        let costoActTotal = 0;
        let itBody = '';
        let ctrlRows = '';
        let miradorDetectado = false;

        activities.filter(a => a.day > 0).forEach(a => {
            costoActTotal += (a.p * pax);
            ctrlRows += `<tr><td>${a.d}</td><td>Q${a.p}</td><td>Q${(a.p*pax).toFixed(2)}</td></tr>`;
            if(a.d.toLowerCase().includes("mirador")) {
                miradorDetectado = true;
            }
        });

        if(miradorDetectado) {
            costoActTotal += (miradorVal * pax);
            ctrlRows += `<tr style="background:#f0fdf4; font-weight:bold;"><td>Entrada Mirador (Extra)</td><td>Q${miradorVal}</td><td>Q${(miradorVal*pax).toFixed(2)}</td></tr>`;
        }

        for (let i = 1; i <= 4; i++) {
            const dayActs = activities.filter(a => a.day === i);
            if (dayActs.length > 0) {
                let list = "<ul>" + dayActs.map(a => `<li>${a.d}</li>`).join('') + "</ul>";
                itBody += `<tr><td style="text-align:center;font-weight:bold">DÍA ${i}</td><td>${list}</td></tr>`;
            }
        }

        const costoBase = costoActTotal + guiaExtra + lanchaExtra;
        const montoFijo = 12970 * (pFijoP / 100);
        const utilidad = (costoBase + montoFijo) * (pUtilP / 100);
        const subtotalNeto = costoBase + montoFijo + utilidad + (0.33 * tc);
        
        const factorImpuestos = 0.1967; 
        const divisor = 1 - (factorImpuestos + (otaPerc / 100));
        const finalGTQ = Math.ceil(subtotalNeto / (divisor || 0.01));
        currentGlobalTotal = finalGTQ;

        document.getElementById('itinerary-preview-body').innerHTML = itBody;
        document.getElementById('v-final-gtq').innerText = finalGTQ.toLocaleString();
        document.getElementById('v-pax-gtq').innerText = Math.ceil(finalGTQ / pax).toLocaleString();
        document.getElementById('v-final-usd').innerText = Math.ceil(finalGTQ / tc).toLocaleString();
        document.getElementById('v-pax-usd').innerText = Math.ceil((finalGTQ / tc) / pax).toLocaleString();

        const curView = document.getElementById('currencyDisplay').value;
        document.getElementById('resGTQ').style.display = (curView === 'usd') ? 'none' : 'block';
        document.getElementById('resUSD').style.display = (curView === 'gtq') ? 'none' : 'block';

        // AUDITORÍA MAESTRA CON POS
        const costoFijoReal = (0.33 * tc);
        const impuestoMonto = finalGTQ * factorImpuestos;
        const montoOTA = finalGTQ * (otaPerc / 100);
        const comisionPOS = finalGTQ * 0.05; // Cálculo del 5% del POS

        document.getElementById('debug-log').innerHTML = `
            <div class="audit-group">
                <div class="audit-group-title">1. Costos Directos</div>
                <div class="audit-item"><span class="audit-label">Actividades (Pax):</span><span class="audit-val">Q ${costoActTotal.toFixed(2)}</span></div>
                <div class="audit-item"><span class="audit-label">Extras (Guía/Lancha):</span><span class="audit-val">Q ${(guiaExtra+lanchaExtra).toFixed(2)}</span></div>
                <div class="audit-item"><span class="audit-label">Costo Base Total:</span><span class="audit-val">Q ${costoBase.toFixed(2)}</span></div>
            </div>
            <div class="audit-group">
                <div class="audit-group-title">2. Márgenes y Operación</div>
                <div class="audit-item"><span class="audit-label">Estructural (${pFijoP}%):</span><span class="audit-val">Q ${montoFijo.toFixed(2)}</span></div>
                <div class="audit-item"><span class="audit-label">Utilidad (${pUtilP}%):</span><span class="audit-val">Q ${utilidad.toFixed(2)}</span></div>
                <div class="audit-item"><span class="audit-label">Fijo Transacción:</span><span class="audit-val">Q ${costoFijoReal.toFixed(2)}</span></div>
                <div class="audit-item" style="border-top:1px solid #444; margin-top:5px; padding-top:5px;">
                    <span class="audit-label">Subtotal Neto:</span><span class="audit-val">Q ${subtotalNeto.toFixed(2)}</span>
                </div>
            </div>
            <div class="audit-group">
                <div class="audit-group-title">3. Impuestos y Pasarelas</div>
                <div class="audit-item"><span class="audit-label">Impuestos (19.67%):</span><span class="audit-val">Q ${impuestoMonto.toFixed(2)}</span></div>
                <div class="audit-item"><span class="audit-label">Comisión OTAS (${otaPerc}%):</span><span class="audit-val">Q ${montoOTA.toFixed(2)}</span></div>
                <div class="audit-item" style="color: #fb7185;"><span class="audit-label">Cargo POS (5%):</span><span class="audit-val">Q ${comisionPOS.toFixed(2)}</span></div>
            </div>
            <div class="audit-group" style="border:none;">
                <div class="audit-item audit-highlight" style="font-size:14px;">
                    <span>PRECIO FINAL:</span><span>Q ${finalGTQ.toLocaleString()}</span>
                </div>
                <div class="audit-item"><span class="audit-label">P/Persona:</span><span class="audit-val">Q ${Math.ceil(finalGTQ/pax).toLocaleString()}</span></div>
            </div>
        `;

        document.getElementById('control-table-container').innerHTML = `<table>
            <thead><tr style="background:#eee"><th>Rubro</th><th>Unit</th><th>Total</th></tr></thead>
            <tbody>${ctrlRows}<tr><td>Servicios Extra (Guía/Lancha)</td><td>-</td><td>Q${(guiaExtra + lanchaExtra).toFixed(2)}</td></tr></tbody>
            <tfoot>
                <tr style="background:#f9f9f9"><td><b>Costo Base</b></td><td>-</td><td><b>Q${costoBase.toFixed(2)}</b></td></tr>
                <tr style="background:#000;color:#fff"><td><b>PRECIO VENTA</b></td><td>-</td><td><b>Q${finalGTQ}</b></td></tr>
            </tfoot>
        </table>`;
    }

    function imprimirDocumento(tipo) {
        const nitInput = document.getElementById('inNit').value.trim().toUpperCase();
        if (currentGlobalTotal > 2500 && (nitInput === "CF" || nitInput === "")) {
            alert("⚠️ ALERTA DE SEGURIDAD CONTABLE:\n\nEl monto supera los Q2,500.00. No se puede emitir a Consumidor Final (CF).\n\nIngrese un NIT válido.");
            document.getElementById('inNit').focus();
            return;
        }
        document.body.classList.remove('print-client', 'print-control');
        document.body.classList.add(tipo === 'client' ? 'print-client' : 'print-control');
        setTimeout(() => { window.print(); }, 200);
    }

    window.onload = () => { initSelector(); calculate(); };
</script>
</body>
</html>
